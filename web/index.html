<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programming Test Case Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Programming Test Case Generator</h1>
        <label for="language">Choose a Programming Language:</label>
        <select id="language">
            <option value="python">Python</option>
            <option value="javascript">JavaScript</option>
            <option value="java">Java</option>
        </select>

        <label for="problem">Enter Problem Description:</label>
        <textarea id="problem" rows="4" cols="50"></textarea>

        <button id="generate">Generate Test Cases</button>

        <h2>Generated Test Cases:</h2>
        <pre id="test-cases"></pre>
    </div>

    <script src="script.js"></script>
</body>
</html>
